<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="640" height="180" fill="#a52a2a"></rect>

  <!-- Text: T -->
  <text x="40" y="110" font-size="64" font-family="Comic Sans MS, Arial, sans-serif" fill="#f4c2c2">T</text>

  <!-- Bear face (o) -->
  <g transform="translate(110,70)">
    <!-- Ears -->
    <circle cx="10" cy="10" r="10" fill="#d8a47f"></circle>
    <circle cx="50" cy="10" r="10" fill="#d8a47f"></circle>
    <!-- Face -->
    <circle cx="30" cy="35" r="25" fill="#d8a47f"></circle>
    <!-- Eyes -->
    <circle cx="22" cy="32" r="3" fill="#000"></circle>
    <circle cx="38" cy="32" r="3" fill="#000"></circle>
    <!-- Nose -->
    <ellipse cx="30" cy="42" rx="5" ry="4" fill="#000"></ellipse>
  </g>

  <!-- Text: y -->
  <text x="180" y="110" font-size="64" font-family="Comic Sans MS, Arial, sans-serif" fill="#f4c2c2">y</text>

  <!-- Text: Store -->
  <text x="240" y="110" font-size="64" font-family="Comic Sans MS, Arial, sans-serif" fill="#b2f5ea">
    Store
  </text>
</svg>